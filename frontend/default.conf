server {
    listen 80;
    server_name _;

    charset utf-8;
    root /usr/share/nginx/html;
    index index.html;

    # SPA / frontend estático.
    # Las llamadas /api/* NO las maneja nginx: el ALB las enruta directo al backend
    # (regla de path-pattern /api/* -> target group del backend).
    location / {
        try_files $uri $uri/ /index.html;
    }
}