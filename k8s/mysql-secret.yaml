apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: tienda
type: Opaque
# El valor real NO se commitea (repo publico). Crear el secret en el cluster con:
#   kubectl create secret generic mysql-secret -n tienda --from-literal=MYSQL_ROOT_PASSWORD='<TU_PASSWORD>'
# (El despliegue real es ECS Fargate; el password se gestiona en AWS SSM SecureString.)
stringData:
  MYSQL_ROOT_PASSWORD: "DEFINIR_EN_EL_CLUSTER"
