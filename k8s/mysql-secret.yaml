apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: tienda
type: Opaque
# NOTA (IE5 - seguridad): la contrasena real NO se versiona en el repositorio.
# Crear el secret directamente en el cluster, por ejemplo:
#   kubectl create secret generic mysql-secret -n tienda \
#     --from-literal=MYSQL_ROOT_PASSWORD='<TU_PASSWORD>'
# Ademas, estos manifiestos k8s/ son de una exploracion previa de EKS y NO se usan en
# la solucion final (ECS Fargate, que toma la clave desde AWS SSM Parameter Store).
stringData:
  MYSQL_ROOT_PASSWORD: "<DEFINIR_FUERA_DEL_REPOSITORIO>"
